name: ENT PMC Retry

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml pypdf
      - name: Download official PMC open-access PDFs
        run: python pmc_retry.py
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: ent-pmc-results
          path: results_pmc
          if-no-files-found: error
          retention-days: 3
