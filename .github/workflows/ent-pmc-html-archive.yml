name: ENT PMC HTML Archive

on:
  pull_request:
    branches: [main]
    paths:
      - 'pmc_html_queue.b64'
      - '.github/workflows/ent-pmc-html-archive.yml'

permissions:
  contents: read

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml pypdf
      - name: Decode queue
        run: base64 --decode pmc_html_queue.b64 > pmc_html_queue.json
      - name: Archive official PMC full text as PDF
        run: |
          python - <<'PY'
          import csv, hashlib, html, io, json, pathlib, re, shutil, subprocess, time
          from concurrent.futures import ThreadPoolExecutor, as_completed
          import requests
          from bs4 import BeautifulSoup
          from pypdf import PdfReader

          rows=json.load(open('pmc_html_queue.json',encoding='utf-8'))
          out=pathlib.Path('pmc_html_results'); pdfroot=out/'pdf'; htmlroot=out/'html'; pdfroot.mkdir(parents=True); htmlroot.mkdir(parents=True)
          chrome=shutil.which('google-chrome') or shutil.which('google-chrome-stable') or shutil.which('chromium') or shutil.which('chromium-browser')
          if not chrome: raise SystemExit('Chrome/Chromium not found')
          headers={'User-Agent':'Mozilla/5.0 ENT-PMC-Archive/1.0'}

          def safe(s,n=150):
              s=re.sub(r'[\\/:*?"<>|\x00-\x1f]+','_',s or '')
              return re.sub(r'\s+','_',s).strip('._ ')[:n] or 'untitled'
          def pdf_info(p):
              try:
                  data=p.read_bytes()
                  if not data.lstrip().startswith(b'%PDF-'): return None
                  r=PdfReader(p,strict=False)
                  return len(r.pages),len(data),hashlib.sha256(data).hexdigest()
              except Exception:return None
          def render_local(xml,row,htmlpath):
              soup=BeautifulSoup(xml,'xml')
              at=soup.find('article-title'); title=at.get_text(' ',strip=True) if at else row['title']
              body=soup.find('body'); parts=[]
              if body:
                  for node in body.find_all(['title','p','list-item','caption'],recursive=True):
                      text=node.get_text(' ',strip=True)
                      if not text: continue
                      if node.name=='title':parts.append(f'<h2>{html.escape(text)}</h2>')
                      elif node.name=='list-item':parts.append(f'<li>{html.escape(text)}</li>')
                      elif node.name=='caption':parts.append(f'<p class="caption">{html.escape(text)}</p>')
                      else:parts.append(f'<p>{html.escape(text)}</p>')
              refs=[]
              for ref in soup.find_all('ref'):
                  t=ref.get_text(' ',strip=True)
                  if t:refs.append(f'<li>{html.escape(t)}</li>')
              source=f'https://www.ebi.ac.uk/europepmc/webservices/rest/{row["pmcid"]}/fullTextXML'
              doc=f'''<!doctype html><html><head><meta charset="utf-8"><style>@page{{size:A4;margin:16mm}}body{{font-family:Arial,"Noto Sans",sans-serif;line-height:1.45;font-size:10.5pt;color:#111}}h1{{font-size:20pt}}h2{{font-size:14pt;margin-top:1.3em}}p{{text-align:justify}}li{{margin-bottom:4px}}.meta,.source{{color:#555;font-size:9pt}}.caption{{font-style:italic}}</style></head><body><h1>{html.escape(title)}</h1><p class="meta">PMCID: {row['pmcid']} &nbsp; DOI: {html.escape(row.get('doi',''))}</p>{''.join(parts)}<h2>References</h2><ol>{''.join(refs)}</ol><p class="source">Archived from legally accessible Europe PMC JATS full text: {html.escape(source)}</p></body></html>'''
              htmlpath.write_text(doc,encoding='utf-8')
              return title,source
          def chrome_print(target,pdfpath,budget='12000'):
              cmd=[chrome,'--headless=new','--no-sandbox','--disable-gpu','--disable-dev-shm-usage',f'--virtual-time-budget={budget}',f'--print-to-pdf={pdfpath.resolve()}',target]
              subprocess.run(cmd,stdout=subprocess.PIPE,stderr=subprocess.PIPE,timeout=100,check=False)
              return pdf_info(pdfpath)
          def one(row):
              pmcid=row['pmcid']; spec=safe(row['specialties'],50); disease=safe(row['diseases'],75); folder=pdfroot/spec/disease; folder.mkdir(parents=True,exist_ok=True)
              stem=safe(f'{pmcid}_{row["title"]}_PMC开放全文归档',170); pdfpath=folder/(stem+'.pdf'); htmlpath=htmlroot/(stem+'.html'); errors=[]
              try:
                  u=f'https://www.ebi.ac.uk/europepmc/webservices/rest/{pmcid}/fullTextXML'
                  r=requests.get(u,headers=headers,timeout=(15,45)); r.raise_for_status()
                  if b'<article' in r.content[:20000] or b'<article' in r.content:
                      official_title,source=render_local(r.content,row,htmlpath)
                      info=chrome_print(htmlpath.resolve().as_uri(),pdfpath,'3000')
                      if info:
                          return {**row,'status':'success','version':'EuropePMC_JATS归档PDF','official_title':official_title,'source_url':source,'path':str(pdfpath),'pages':info[0],'size_bytes':info[1],'sha256':info[2],'error':''}
              except Exception as e:errors.append('JATS '+repr(e)[:180])
              try:
                  source=f'https://pmc.ncbi.nlm.nih.gov/articles/{pmcid}/'
                  info=chrome_print(source,pdfpath,'18000')
                  if info:
                      return {**row,'status':'success','version':'PMC官方网页打印PDF','official_title':'','source_url':source,'path':str(pdfpath),'pages':info[0],'size_bytes':info[1],'sha256':info[2],'error':' | '.join(errors)}
              except Exception as e:errors.append('HTML '+repr(e)[:180])
              return {**row,'status':'failed','version':'','official_title':'','source_url':'','path':'','pages':'','size_bytes':'','sha256':'','error':' | '.join(errors)}

          results=[]
          with ThreadPoolExecutor(max_workers=4) as ex:
              futs={ex.submit(one,r):r['pmcid'] for r in rows}
              for i,f in enumerate(as_completed(futs),1):
                  x=f.result();results.append(x);print(f'[{i}/{len(rows)}] {x["status"]} {x["pmcid"]} {x.get("pages","")}',flush=True)
          results.sort(key=lambda x:x['pmcid'])
          fields=[]
          for r in results:
              for k in r:
                  if k not in fields:fields.append(k)
          with open(out/'report.csv','w',encoding='utf-8-sig',newline='') as f:
              w=csv.DictWriter(f,fieldnames=fields);w.writeheader();w.writerows(results)
          summary={'total':len(results),'success':sum(r['status']=='success' for r in results),'failed':sum(r['status']!='success' for r in results),'jats':sum(r.get('version')=='EuropePMC_JATS归档PDF' for r in results),'html_print':sum(r.get('version')=='PMC官方网页打印PDF' for r in results),'pages':sum(int(r.get('pages') or 0) for r in results)}
          (out/'summary.json').write_text(json.dumps(summary,ensure_ascii=False,indent=2),encoding='utf-8');print(summary)
          PY
      - name: Upload PMC archive results
        uses: actions/upload-artifact@v4
        with:
          name: ent-pmc-html-results
          path: pmc_html_results
          if-no-files-found: error
          retention-days: 3
          compression-level: 6
