name: ENT Download Event and Clean Fulltext

on:
  pull_request:
    branches: [main]
    paths: ['download_event_clean.trigger']

permissions:
  contents: read

jobs:
  retrieve:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: Install browser dependencies
        run: |
          pip install playwright pypdf beautifulsoup4
          python -m playwright install --with-deps chromium
      - name: Capture public downloads and clean full text
        run: |
          python - <<'PY'
          import csv, hashlib, io, json, pathlib, re, html, urllib.parse
          from playwright.sync_api import sync_playwright, TimeoutError as PWTimeout
          from pypdf import PdfReader
          from bs4 import BeautifulSoup

          out=pathlib.Path('download_event_results');pdfroot=out/'pdf';pdfroot.mkdir(parents=True,exist_ok=True)
          items=[
            {'id':'PMC8134171','title':'When Is the Vestibular Aqueduct Enlarged? A Statistical Analysis of the Normative Distribution of Vestibular Aqueduct Size','landing':'https://www.ajnr.org/content/28/6/1133','selectors':['a[href*="1133.full.pdf"]','a:has-text("PDF")'],'pdf':'https://www.ajnr.org/content/ajnr/28/6/1133.full.pdf','mode':'download'},
            {'id':'PMC7108032','title':'Clinical Practice Guideline for the Diagnosis and Management of Group A Streptococcal Pharyngitis: 2012 Update by the Infectious Diseases Society of America','landing':'https://www.idsociety.org/practice-guideline/streptococcal-pharyngitis/','selectors':['a:has-text("Download PDF")','a[href*="cis629.pdf"]'],'pdf':'https://academic.oup.com/cid/article-pdf/55/10/e86/17350181/cis629.pdf','mode':'download'},
            {'id':'PMC3360444','title':'Globus pharyngeus: A review of its etiology, diagnosis and treatment','landing':'https://www.wjgnet.com/1007-9327/full/v18/i20/2462.htm','selectors':['a:has-text("Full Article with Cover")','a[href*="/PDF/"]'],'pdf':'https://www.wjgnet.com/1007-9327/PDF/v18/i20/2462.pdf','mode':'download'},
            {'id':'PMC7154615','title':'Recommendations for Management of Acute Pharyngitis in Adults','landing':'https://www.elsevier.es/en-revista-acta-otorrinolaringologica-espanola-402-articulo-recommendations-for-management-acute-pharyngitis-S2173573515000423','selectors':['a:has-text("Download PDF")','a[href*="-pdf-"]'],'pdf':'https://www.elsevier.es/en-revista-acta-otorrinolaringologica-espanola-402-pdf-S2173573515000423','mode':'download_or_clean'}
          ]
          stop={'with','from','that','this','into','after','using','study','review','clinical','patients','guideline','management','treatment'}
          def toks(x):return {w for w in re.findall(r'[a-z0-9]+',(x or '').lower()) if len(w)>3 and w not in stop}
          def safe(x):return re.sub(r'[^\w.-]+','_',x,flags=re.UNICODE)[:140]
          def check(data,title,minp=2):
            if not data or not data.lstrip().startswith(b'%PDF-'):return None
            try:
              r=PdfReader(io.BytesIO(data),strict=False);p=len(r.pages);t=' '.join((r.pages[i].extract_text() or '') for i in range(min(p,6)));s=len(toks(title)&toks(t))/max(1,len(toks(title)))
              if p<minp or (t and s<.17):return None
              return {'pages':p,'bytes':len(data),'sha256':hashlib.sha256(data).hexdigest(),'score':round(s,3)}
            except Exception:return None
          def download_link(page,selector):
            loc=page.locator(selector)
            if not loc.count():return None,None,'selector_missing'
            el=loc.first
            try:
              with page.expect_download(timeout=45000) as di: el.click(timeout=20000)
              d=di.value;temp=pathlib.Path(d.path());return temp.read_bytes(),d.url,'download_event'
            except Exception as e:
              return None,None,'download_event:'+type(e).__name__+':'+str(e)[:150]
          def clean_article(page,item):
            title=item['title'];body_text=page.locator('body').inner_text(timeout=15000);low=body_text.lower()
            if len(body_text)<7000 or any(x in low for x in ['verify you are human','recaptcha','preview of subscription content','purchase this article','buy now']):return None,None,'not_full_text'
            candidates=['article','.article-body','.article-content','.article__body','.contenido-articulo','.content-article','#article-body','#articleBody','main']
            best_html='';best_text=''
            for sel in candidates:
              try:
                for node in page.locator(sel).all():
                  t=node.inner_text(timeout=2000);h=node.inner_html(timeout=2000)
                  if len(t)>len(best_text):best_text=t;best_html=h
              except Exception:pass
            if len(best_text)<6500:
              best_text=body_text;best_html='<pre>'+html.escape(body_text)+'</pre>'
            score=len(toks(title)&toks(best_text))/max(1,len(toks(title)))
            markers=sum(x in best_text.lower() for x in ['abstract','introduction','methods','results','discussion','conclusion','references','recommendations'])
            if score<.18 or markers<3:return None,None,f'fulltext_validation:chars={len(best_text)} score={score:.2f} markers={markers}'
            source=page.url
            doc=f'''<!doctype html><html><head><meta charset="utf-8"><title>{html.escape(title)}</title><style>@page{{size:A4;margin:15mm}}body{{font-family:Arial,"Noto Sans",sans-serif;color:#111;font-size:10.5pt;line-height:1.48}}h1{{font-size:19pt;line-height:1.2}}h2{{font-size:14pt;margin-top:1.3em}}h3{{font-size:12pt}}p,li{{text-align:justify}}img{{max-width:100%;height:auto}}table{{border-collapse:collapse;width:100%;font-size:9pt}}td,th{{border:1px solid #aaa;padding:4px}}.meta{{color:#555;font-size:9pt}}</style></head><body><h1>{html.escape(title)}</h1><p class="meta">Official public full-text source: {html.escape(source)}</p>{best_html}</body></html>'''
            page.set_content(doc,wait_until='load');page.wait_for_timeout(1500);data=page.pdf(format='A4',print_background=True);return data,source,f'clean_chars={len(best_text)} score={score:.2f} markers={markers}'

          results=[]
          with sync_playwright() as pw:
            b=pw.chromium.launch(headless=True,args=['--no-sandbox','--disable-dev-shm-usage'])
            for it in items:
              c=b.new_context(accept_downloads=True,user_agent='Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/126 Safari/537.36',locale='en-US');p=c.new_page();errs=[];r={**it,'status':'failed','version':'','source_url':'','path':'','pages':'','size_bytes':'','sha256':'','score':'','error':''}
              try:
                p.goto(it['landing'],wait_until='domcontentloaded',timeout=65000);p.wait_for_timeout(3500)
                for sel in it['selectors']:
                  data,url,msg=download_link(p,sel);errs.append(sel+':'+msg)
                  info=check(data,it['title']) if data else None
                  if info:
                    f=pdfroot/f'{it["id"]}_{safe(it["title"])}_publisher.pdf';f.write_bytes(data);r.update(status='success',version='出版社/学会原版PDF',source_url=url or it['pdf'],path=str(f),pages=info['pages'],size_bytes=info['bytes'],sha256=info['sha256'],score=info['score']);break
                if r['status']!='success':
                  # Build a temporary normal anchor so the browser handles Content-Disposition as a download.
                  q=c.new_page();q.set_content(f'<a id="d" href="{html.escape(it["pdf"])}">download</a>')
                  data,url,msg=download_link(q,'#d');errs.append('explicit_anchor:'+msg);info=check(data,it['title']) if data else None
                  if info:
                    f=pdfroot/f'{it["id"]}_{safe(it["title"])}_publisher.pdf';f.write_bytes(data);r.update(status='success',version='出版社/学会原版PDF',source_url=url or it['pdf'],path=str(f),pages=info['pages'],size_bytes=info['bytes'],sha256=info['sha256'],score=info['score'])
                  q.close()
                if r['status']!='success' and it['mode']=='download_or_clean':
                  data,url,msg=clean_article(p,it);errs.append(msg);info=check(data,it['title'],3) if data else None
                  if info:
                    f=pdfroot/f'{it["id"]}_{safe(it["title"])}_official_web_clean.pdf';f.write_bytes(data);r.update(status='success',version='官方开放网页全文干净归档PDF',source_url=url,path=str(f),pages=info['pages'],size_bytes=info['bytes'],sha256=info['sha256'],score=info['score'])
              except Exception as e:errs.append(type(e).__name__+':'+str(e)[:180])
              r['error']=' | '.join(errs);results.append(r);print(it['id'],r['status'],r.get('version'),r.get('pages'),flush=True);c.close()
            b.close()
          fields=[]
          for r in results:
            for k in r:
              if k not in fields:fields.append(k)
          with open(out/'report.csv','w',encoding='utf-8-sig',newline='') as f:w=csv.DictWriter(f,fieldnames=fields);w.writeheader();w.writerows(results)
          s={'total':len(results),'success':sum(x['status']=='success' for x in results),'publisher':sum(x.get('version')=='出版社/学会原版PDF' for x in results),'clean_web':sum(x.get('version')=='官方开放网页全文干净归档PDF' for x in results),'pages':sum(int(x.get('pages') or 0) for x in results)};(out/'summary.json').write_text(json.dumps(s,ensure_ascii=False,indent=2),encoding='utf-8');print(s)
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: ent-download-event-results
          path: download_event_results
          if-no-files-found: error
          retention-days: 3
          compression-level: 6